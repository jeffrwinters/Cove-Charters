name: Deploy Cove API Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cove API Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show Wrangler config
        run: cat wrangler.toml

      - name: Install Wrangler
        run: npm install --global wrangler@latest

      - name: Deploy Worker
        env:
          CF_TOKEN_RAW: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_RAW: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CF_TOKEN_RAW" | tr -d '\r\n ')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CF_ACCOUNT_RAW" | tr -d '\r\n ')"
          wrangler deploy
