<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove Boat Details</title>
  <meta name="description" content="View a Cove Charters boat detail record." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#071923;--water:#0f6f8f;--sand:#f2dfbd;--ink:#10212b;--muted:#667987;--bg:#f8f3e9;--radius:28px;--shadow:0 22px 60px rgba(7,25,35,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg)}a{text-decoration:none;color:inherit}.wrap{width:min(1080px,calc(100% - 36px));margin:auto}.nav{padding:20px 0;display:flex;justify-content:space-between;gap:16px;align-items:center}.brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;background:var(--sand);color:var(--navy);font-weight:900}.btn.dark{background:var(--navy);color:white}.hero{background:linear-gradient(135deg,var(--navy),#10445b);color:white;border-radius:36px;padding:42px;box-shadow:var(--shadow);margin-bottom:24px}.kicker{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--sand);margin-bottom:12px}h1{font-size:clamp(42px,7vw,76px);line-height:.9;letter-spacing:-.07em;margin:0 0 18px}.hero p{font-size:18px;line-height:1.65;color:rgba(255,255,255,.78);max-width:760px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:900}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;margin-bottom:42px}.card{background:white;border:1px solid rgba(16,33,43,.08);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}.card h2{font-size:28px;letter-spacing:-.04em;margin:0 0 14px;color:var(--navy)}.card p{color:var(--muted);line-height:1.6}.specs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.spec{padding:14px;border-radius:18px;background:#f1f6f7}.spec span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.spec strong{display:block;font-size:24px;margin-top:4px}.amenities{display:flex;gap:8px;flex-wrap:wrap}.amenities span{padding:9px 11px;border-radius:999px;background:#eef6f8;color:#3f5965;font-size:13px;font-weight:800}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.loading{background:white;border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);color:var(--muted)}footer{padding:34px 0;color:var(--muted)}@media(max-width:760px){.grid,.specs{grid-template-columns:1fr}.hero{padding:28px}.actions .btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav"><a class="brand" href="index.html">Cove Charters</a><a class="btn" href="index.html#boats">Back to Fleet</a></nav>
    <main id="app"><div class="loading">Loading live boat record…</div></main>
    <footer>Live D1-backed boat detail MVP</footer>
  </div>
  <script>
    const COVE_API='https://cove-api.jeff-r-winters.workers.dev';
    const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));
    const params=new URLSearchParams(location.search);
    const requested=params.get('boat')||params.get('slug')||params.get('id');
    const val=(v,fallback='--')=>v===undefined||v===null||v===''?fallback:v;
    const price=b=>b.startingPrice||b.baseFee||0;
    const priceText=b=>price(b)?`${money(price(b))} / ${b.priceUnit||'charter'}`:'Contact for pricing';
    function normalizeBoat(b){return {...b,amenities:b.amenities||[],approvedCaptainIds:b.approvedCaptainIds||[],sourceListingUrl:b.sourceListingUrl||'#'};}
    function render(boat){boat=normalizeBoat(boat);document.title=`${boat.name} | Cove Charters`;const specs=[['Length',`${val(boat.lengthFt)}'`],['Guests',val(boat.capacity)],['Starting price',priceText(boat)],['Boat type',val(boat.type)],['Make',val(boat.make)],['Model',val(boat.model)],['Bedrooms',val(boat.bedrooms)],['Bathrooms',val(boat.bathrooms)]];document.getElementById('app').innerHTML=`<section class="hero"><div class="kicker">${val(boat.homePort,'Lake of the Ozarks')} • ${val(boat.lifecycleStatus,'fleet')}</div><h1>${boat.name}</h1><p>${boat.shortDescription||'Premium Lake of the Ozarks charter boat.'}</p><div class="meta"><span class="pill">${boat.status||'draft'}</span><span class="pill">${boat.bookingEnabled?'Booking enabled':'Booking disabled'}</span><span class="pill">${boat.featured?'Featured':'Standard fleet'}</span><span class="pill">Record: ${boat.id}</span></div><div class="actions"><a class="btn" href="index.html#finder">Start Booking Request</a><a class="btn dark" href="admin.html">Open in Command Center</a></div></section><div class="grid"><section class="card"><h2>Boat record</h2><p>This is a first-class Cove boat record loaded from the live <strong>Cove API / D1 database</strong>.</p><div class="specs">${specs.map(([label,value])=>`<div class="spec"><span>${label}</span><strong>${value}</strong></div>`).join('')}</div></section><section class="card"><h2>Amenities</h2><div class="amenities">${boat.amenities.length?boat.amenities.map(item=>`<span>${item}</span>`).join(''):'<span>Amenities coming soon</span>'}</div><h2 style="margin-top:26px">Operations</h2><p><strong>Owner:</strong> ${val(boat.ownerId,'Not assigned yet')}</p><p><strong>Approved captains:</strong> ${boat.approvedCaptainIds.length?boat.approvedCaptainIds.join(', '):'Not assigned yet'}</p>${boat.sourceListingUrl&&boat.sourceListingUrl!=='#'?`<p><strong>Original source listing:</strong><br><a href="${boat.sourceListingUrl}" target="_blank" rel="noopener">Reference listing</a></p>`:''}</section></div>`}
    async function loadFromApi(){const r=await fetch(`${COVE_API}/api/v1/boats`,{cache:'no-store'});const data=await r.json();if(!r.ok)throw new Error(data.error||'API failed');const boat=data.find(item=>item.slug===requested||item.id===requested)||data[0];if(!boat)throw new Error('No boat records found');render(boat);}
    async function loadFallback(){const r=await fetch('data/boats.json',{cache:'no-store'});const data=await r.json();const boat=data.find(item=>item.slug===requested||item.id===requested)||data[0];render(boat);}
    loadFromApi().catch(error=>{console.warn('Cove API unavailable, using JSON fallback',error);loadFallback().catch(()=>{document.getElementById('app').innerHTML='<div class="loading">Boat record could not be loaded.</div>';});});
  </script>
</body>
</html>
