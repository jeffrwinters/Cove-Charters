<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove Boat Details</title>
  <meta name="description" content="View a Cove Charters boat detail record." />
  <link rel="canonical" href="https://jeffrwinters.github.io/Cove-Charters/boat.html" />
  <meta property="og:type" content="product" />
  <meta property="og:title" content="Cove Charters Boat Detail" />
  <meta property="og:description" content="View Lake of the Ozarks charter boat details, media, approved captains, and request a charter with Cove." />
  <meta property="og:url" content="https://jeffrwinters.github.io/Cove-Charters/boat.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#071923;--water:#0f6f8f;--sand:#f2dfbd;--ink:#10212b;--muted:#667987;--bg:#f8f3e9;--radius:28px;--shadow:0 22px 60px rgba(7,25,35,.16)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg)}
    a{text-decoration:none;color:inherit}
    button,input,select,textarea{font:inherit}
    .wrap{width:min(1080px,calc(100% - 36px));margin:auto}
    .nav{position:fixed;z-index:10;top:16px;left:50%;transform:translateX(-50%);width:min(1080px,calc(100% - 36px));display:flex;justify-content:space-between;gap:16px;align-items:center;padding:14px 18px;border-radius:999px;background:rgba(7,25,35,.86);border:1px solid rgba(255,255,255,.12);box-shadow:0 16px 42px rgba(7,25,35,.22);backdrop-filter:blur(14px)}
    .brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:white;text-shadow:0 1px 10px rgba(0,0,0,.35)}
    .nav .btn{background:var(--sand);color:var(--navy)}
    main{padding-top:100px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;background:var(--sand);color:var(--navy);font-weight:900;border:0;cursor:pointer}
    .btn.dark{background:var(--navy);color:white}
    .btn.light{background:#eef6f8;color:var(--navy)}
    .hero{position:relative;overflow:hidden;color:white;border-radius:36px;padding:42px;box-shadow:var(--shadow);margin-bottom:24px;background:linear-gradient(135deg,var(--navy),#10445b)}
    .hero.has-cover{min-height:560px;display:flex;align-items:end;background-image:linear-gradient(180deg,rgba(7,25,35,.08),rgba(7,25,35,.92)),var(--cover);background-size:cover;background-position:center}
    .hero-content{position:relative;z-index:1;max-width:820px}
    .kicker{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--sand);margin-bottom:12px}
    h1{font-size:clamp(42px,7vw,76px);line-height:.9;letter-spacing:-.07em;margin:0 0 18px}
    .hero p{font-size:18px;line-height:1.65;color:rgba(255,255,255,.78);max-width:760px}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
    .pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:900}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;margin-bottom:42px}
    .card{background:white;border:1px solid rgba(16,33,43,.08);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}
    .card h2{font-size:28px;letter-spacing:-.04em;margin:0 0 14px;color:var(--navy)}
    .card p{color:var(--muted);line-height:1.6}
    .specs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .spec{padding:14px;border-radius:18px;background:#f1f6f7}
    .spec span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}
    .spec strong{display:block;font-size:24px;margin-top:4px}
    .amenities{display:flex;gap:8px;flex-wrap:wrap}
    .amenities span{padding:9px 11px;border-radius:999px;background:#eef6f8;color:#3f5965;font-size:13px;font-weight:800}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
    .media-section{margin-bottom:42px}
    .section-head{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:16px}
    .section-head h2{font-size:34px;letter-spacing:-.05em;line-height:1;margin:0;color:var(--navy)}
    .section-head p{color:var(--muted);line-height:1.55;margin:0;max-width:420px}
    .gallery-stage{background:white;border:1px solid rgba(16,33,43,.08);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .stage-media{width:100%;aspect-ratio:16/9;background:#dbe7eb;display:block;object-fit:cover;touch-action:pan-y;user-select:none}
    .gallery-controls{display:flex;justify-content:space-between;gap:10px;padding:14px;align-items:center}
    .gallery-controls strong{min-width:0;overflow-wrap:anywhere;line-height:1.2}
    .thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
    .thumb{border:3px solid transparent;border-radius:16px;overflow:hidden;background:white;box-shadow:0 8px 18px rgba(7,25,35,.08);cursor:pointer;padding:0}
    .thumb.active{border-color:var(--water)}
    .thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .video-grid video{width:100%;border-radius:20px;background:#071923;box-shadow:var(--shadow)}
    .empty{background:white;border:1px dashed #c9d8dd;border-radius:var(--radius);padding:24px;color:var(--muted);line-height:1.55}
    .request-form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .request-form label{display:grid;gap:7px;color:#425967;font-weight:800;font-size:13px}
    .request-form input,.request-form select,.request-form textarea{width:100%;border:1px solid #dbe7eb;background:white;border-radius:14px;padding:12px;color:var(--ink)}
    .request-form textarea{min-height:104px}
    .full{grid-column:1/-1}
    .form-status{color:var(--muted);line-height:1.5;margin:0}
    .availability-note{grid-column:1/-1;padding:14px 16px;border-radius:16px;background:#f8fbfc;border:1px solid #dbe7eb;color:var(--muted);line-height:1.45}
    .availability-note.good{background:#e9f7f0;border-color:#c9ead8;color:#1f8a5b}
    .availability-note.warn{background:#fff2f2;border-color:#f2cece;color:#a43c3c}
    .trust-list{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 2px;padding:0;list-style:none}
    .trust-list li{padding:12px;border-radius:16px;background:#f8fbfc;border:1px solid #dbe7eb;color:#425967;font-size:13px;font-weight:800;line-height:1.35}
    .next-steps{grid-column:1/-1;padding:16px;border-radius:18px;background:#fffaf0;border:1px solid #f2dfbd;color:#5a4930;line-height:1.55}
    .loading{background:white;border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);color:var(--muted)}
    footer{padding:34px 0;color:var(--muted)}
    @media(max-width:760px){.grid,.specs,.request-form,.trust-list{grid-template-columns:1fr}.section-head{display:block}.section-head p{margin-top:10px}.hero{padding:28px}.hero.has-cover{min-height:500px}.actions .btn{width:100%}.nav{top:10px}.brand{font-size:13px}.gallery-stage{border-radius:22px}.gallery-controls{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;padding:12px}.gallery-controls .actions{display:flex;margin:0;gap:8px}.gallery-controls .btn{width:auto;min-height:40px;padding:0 14px}.stage-media{aspect-ratio:4/3}.thumbs{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px;scroll-snap-type:x proximity}.thumb{min-width:86px;border-radius:12px;scroll-snap-align:start}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav"><a class="brand" href="index.html">Cove Charters</a><a class="btn" href="index.html#boats">Back to Fleet</a></nav>
    <main id="app"><div class="loading">Loading boat details...</div></main>
    <footer>Cove Charters | Lake of the Ozarks boat charters</footer>
  </div>
  <script>
    const COVE_API='https://cove-api.jeff-r-winters.workers.dev';
    const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));
    const params=new URLSearchParams(location.search);
    const requested=params.get('boat')||params.get('slug')||params.get('id');
    const state={boat:null,media:[],captains:[],activePhoto:0};
    const val=(v,fallback='--')=>v===undefined||v===null||v===''?fallback:v;
    const price=b=>b.startingPrice||b.baseFee||0;
    const priceText=b=>price(b)?`${money(price(b))} / ${b.priceUnit||'charter'}`:'Contact for pricing';
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function normalizeBoat(b){return {...b,amenities:b.amenities||[],approvedCaptainIds:b.approvedCaptainIds||[],sourceListingUrl:b.sourceListingUrl||'#'};}
    function normalizeMedia(items){return (items||[]).map(m=>({...m,mediaType:m.mediaType||m.media_type,sortOrder:Number(m.sortOrder??m.sort_order??0),isCover:Boolean(m.isCover??m.is_cover)})).sort((a,b)=>Number(b.isCover)-Number(a.isCover)||a.sortOrder-b.sortOrder);}
    function photos(){return state.media.filter(m=>m.mediaType==='photos');}
    function videos(){return state.media.filter(m=>m.mediaType==='videos');}
    function coverPhoto(){return photos().find(m=>m.isCover)||photos()[state.activePhoto]||null;}
    function setMeta(name,content,property=false){let el=document.querySelector(property?`meta[property="${name}"]`:`meta[name="${name}"]`);if(!el){el=document.createElement('meta');el.setAttribute(property?'property':'name',name);document.head.appendChild(el);}el.setAttribute('content',content);}
    function setCanonical(url){let el=document.querySelector('link[rel="canonical"]');if(!el){el=document.createElement('link');el.rel='canonical';document.head.appendChild(el);}el.href=url;}
    function updateSeo(boat){const url=`${location.origin}${location.pathname}?boat=${encodeURIComponent(boat.slug||boat.id)}`;const title=`${boat.name} Charter | Cove Charters Lake of the Ozarks`;const description=`Request ${boat.name}, a ${boat.lengthFt||''} foot Lake of the Ozarks charter boat for up to ${boat.capacity||'your group'} guests with Cove Charters.`;document.title=title;setMeta('description',description);setMeta('og:title',title,true);setMeta('og:description',description,true);setMeta('og:url',url,true);setCanonical(url);let json=document.getElementById('boatSchema');if(!json){json=document.createElement('script');json.type='application/ld+json';json.id='boatSchema';document.head.appendChild(json);}json.textContent=JSON.stringify({'@context':'https://schema.org','@type':'Product',name:boat.name,description,url,brand:{'@type':'Brand',name:'Cove Charters'},offers:{'@type':'Offer',availability:'https://schema.org/InStock',priceCurrency:'USD',price:price(boat)||undefined}});}
    function render(boat){state.boat=normalizeBoat(boat);updateSeo(state.boat);draw();}
    function draw(){const boat=state.boat;if(!boat)return;const specs=[['Length',`${val(boat.lengthFt)}'`],['Guests',val(boat.capacity)],['Starting price',priceText(boat)],['Boat type',val(boat.type)],['Make',val(boat.make)],['Model',val(boat.model)],['Bedrooms',val(boat.bedrooms)],['Bathrooms',val(boat.bathrooms)]];const cover=coverPhoto();document.getElementById('app').innerHTML=`${hero(boat,cover)}${mediaMarkup()}${bookingForm()}<div class="grid"><section class="card"><h2>Charter overview</h2><p>${esc(boat.shortDescription||'A polished Lake of the Ozarks charter option for your day on the water.')}</p><div class="specs">${specs.map(([label,value])=>`<div class="spec"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join('')}</div></section><section class="card"><h2>Included details</h2><div class="amenities">${boat.amenities.length?boat.amenities.map(item=>`<span>${esc(item)}</span>`).join(''):'<span>Details coming soon</span>'}</div><h2 style="margin-top:26px">Available captains</h2><p>${state.captains.length?esc(state.captains.map(c=>c.name).join(', ')):'Captain options are being finalized for this boat.'}</p></section></div>`;bindGallery();bindBookingForm();}
    function hero(boat,cover){const style=cover?` style="--cover:url('${esc(cover.url)}')"`:'';return `<section class="hero ${cover?'has-cover':''}"${style}><div class="hero-content"><div class="kicker">${esc(val(boat.homePort,'Lake of the Ozarks'))} | Charter boat</div><h1>${esc(boat.name)}</h1><p>${esc(boat.shortDescription||'Premium Lake of the Ozarks charter boat.')}</p><div class="meta"><span class="pill">${boat.featured?'Featured charter':'Cove fleet'}</span><span class="pill">${val(boat.capacity,'--')} guests</span><span class="pill">${priceText(boat)}</span></div><div class="actions"><a class="btn" href="#request">Book This Boat</a></div></div></section>`}
    function mediaMarkup(){const p=photos();const v=videos();if(!p.length&&!v.length)return `<section class="media-section"><div class="empty">Photos and videos are coming soon for this boat.</div></section>`;const active=p[state.activePhoto]||p[0];return `<section class="media-section"><div class="section-head"><div><div class="kicker" style="color:var(--water)">Boat Media</div><h2>See the charter before you book.</h2></div><p>Review the layout, seating, and on-water feel before sending your request.</p></div>${p.length?`<div class="gallery-stage"><img class="stage-media" id="stagePhoto" src="${esc(active.url)}" alt="${esc(active.alt||active.title||state.boat.name)}" draggable="false"><div class="gallery-controls"><strong>${esc(active.title||'Gallery photo')} <span class="pill">${state.activePhoto+1} / ${p.length}</span></strong><div class="actions"><button class="btn light" type="button" id="prevPhoto" aria-label="Previous photo">Previous</button><button class="btn light" type="button" id="nextPhoto" aria-label="Next photo">Next</button></div></div></div><div class="thumbs">${p.map((m,i)=>`<button class="thumb ${i===state.activePhoto?'active':''}" type="button" data-photo="${i}" aria-label="Show photo ${i+1}"><img src="${esc(m.url)}" alt="${esc(m.alt||m.title||state.boat.name)}"></button>`).join('')}</div>`:''}${v.length?`<div class="section-head" style="margin-top:28px"><div><div class="kicker" style="color:var(--water)">Video</div><h2>On-water view.</h2></div></div><div class="video-grid">${v.map(m=>`<video src="${esc(m.url)}" controls preload="metadata"></video>`).join('')}</div>`:''}</section>`}
    function bindGallery(){const p=photos();const show=delta=>{state.activePhoto=(state.activePhoto+delta+p.length)%p.length;draw();};document.querySelectorAll('[data-photo]').forEach(btn=>btn.onclick=()=>{state.activePhoto=Number(btn.dataset.photo);draw();});const prev=document.getElementById('prevPhoto');const next=document.getElementById('nextPhoto');if(prev)prev.onclick=()=>show(-1);if(next)next.onclick=()=>show(1);const stage=document.getElementById('stagePhoto');if(stage&&p.length>1){let startX=0,startY=0;stage.addEventListener('touchstart',e=>{const t=e.touches[0];startX=t.clientX;startY=t.clientY;},{passive:true});stage.addEventListener('touchend',e=>{const t=e.changedTouches[0];const dx=t.clientX-startX;const dy=t.clientY-startY;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.3)show(dx<0?1:-1);},{passive:true});}}
    function bookingForm(){const captainOptions=state.captains.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}${c.credential?` - ${esc(c.credential)}`:''}</option>`).join('');return `<section class="card" id="request" style="margin-bottom:42px"><div class="kicker" style="color:var(--water)">Booking Request</div><h2>Request this charter</h2><p>Tell us when you want to go. No payment is due today; Cove back office will confirm the boat, captain, agreement, and payment details before anything is final.</p><datalist id="halfHourTimes">${halfHourOptions()}</datalist><form class="request-form" id="bookingRequestForm"><ul class="trust-list"><li>No payment due with this request.</li><li>Captain selection is reviewed before confirmation.</li><li>Cove emails the next steps after back-office review.</li></ul><label>Charter date<input id="bookingDate" type="date" required></label><label>Start time<input id="bookingStartTime" type="time" step="1800" list="halfHourTimes" required></label><label>Duration<select id="bookingDuration"><option value="4">4 hours</option><option value="6">6 hours</option><option value="8">8 hours</option></select></label><label>Captain<select id="bookingCaptainId" ${state.captains.length?'required':''}>${state.captains.length?'<option value="">Choose captain</option>'+captainOptions:'<option value="">Captain assignment pending</option>'}</select></label><div class="availability-note" id="availabilityNote">Choose a date and time to check likely availability.</div><label>Name<input id="bookingName" autocomplete="name" required></label><label>Email<input id="bookingEmail" type="email" autocomplete="email"></label><label>Phone<input id="bookingPhone" autocomplete="tel"></label><label class="full">Notes<textarea id="bookingNotes" placeholder="Occasion, guest count, timing flexibility, questions"></textarea></label><div class="next-steps"><strong>What happens next:</strong> Cove reviews availability, confirms your selected captain, sends the agreement/payment details, then emails your confirmation.</div><div class="actions full"><button class="btn" type="submit">Send Request</button><p class="form-status" id="bookingStatus"></p></div></form></section>`}
    function halfHourOptions(){return Array.from({length:48},(_,i)=>{const total=i*30;return `<option value="${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}"></option>`}).join('');}
    function snapHalfHour(input){if(!input.value)return;const [h,m]=input.value.split(':').map(Number);let total=h*60+m;total=Math.round(total/30)*30;if(total>=1440)total=1410;input.value=`${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;}
    function requestWindow(){if(!bookingDate.value||!bookingStartTime.value)return null;const start=`${bookingDate.value}T${bookingStartTime.value}`;const endDate=new Date(start);endDate.setMinutes(endDate.getMinutes()+Number(bookingDuration.value||4)*60);const end=`${endDate.getFullYear()}-${String(endDate.getMonth()+1).padStart(2,'0')}-${String(endDate.getDate()).padStart(2,'0')}T${String(endDate.getHours()).padStart(2,'0')}:${String(endDate.getMinutes()).padStart(2,'0')}`;return {start,end};}
    async function checkAvailability(){const win=requestWindow();availabilityNote.className='availability-note';if(!win){availabilityNote.textContent='Choose a date and time to check likely availability.';return '';}availabilityNote.textContent='Checking likely availability...';try{const params=new URLSearchParams({entityType:'boat',entityId:state.boat.id,from:win.start,to:win.end});const r=await fetch(`${COVE_API}/api/v1/availability?${params}`,{cache:'no-store'});const blocks=await r.json();if(!r.ok)throw new Error(blocks.error||'Availability check failed');const conflicts=blocks.filter(a=>a.startAt<win.end&&a.endAt>win.start);if(conflicts.length){availabilityNote.className='availability-note warn';availabilityNote.textContent='This time has a possible scheduling conflict. Send the request anyway and Cove will confirm the best available option.';return `Customer saw availability warning for ${win.start} to ${win.end}.`; }availabilityNote.className='availability-note good';availabilityNote.textContent='This time looks open. Cove will still confirm the boat, captain, and final details.';return `Customer saw likely open availability for ${win.start} to ${win.end}.`;}catch(error){availabilityNote.textContent='Availability check is unavailable right now. You can still submit a request and Cove will review it manually.';return `Availability check unavailable: ${error.message}`;}}
    function bindBookingForm(){const form=document.getElementById('bookingRequestForm');if(!form)return;bookingStartTime.onblur=()=>snapHalfHour(bookingStartTime);bookingStartTime.onchange=()=>{snapHalfHour(bookingStartTime);checkAvailability();};[bookingDate,bookingDuration].forEach(input=>input.onchange=checkAvailability);form.onsubmit=async e=>{e.preventDefault();snapHalfHour(bookingStartTime);bookingStatus.textContent='Sending request...';const availabilityContext=await checkAvailability();const notes=[bookingNotes.value,availabilityContext].filter(Boolean).join('\n\n');const payload={boatId:state.boat.id,captainId:bookingCaptainId.value||null,charterDate:bookingDate.value,startTime:bookingStartTime.value,durationHours:Number(bookingDuration.value||4),customerName:bookingName.value,email:bookingEmail.value,phone:bookingPhone.value,notes};try{const r=await fetch(`${COVE_API}/api/v1/bookings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');bookingStatus.textContent=`Request received. Reference ${d.id}. Watch your email for Cove's follow-up after back-office review.`;form.reset();availabilityNote.className='availability-note';availabilityNote.textContent='Choose a date and time to check likely availability.';}catch(error){bookingStatus.textContent=error.message;}}}
    async function loadCaptainsForBoat(boat){try{const r=await fetch(`${COVE_API}/api/v1/boats/${encodeURIComponent(boat.id)}/captains`,{cache:'no-store'});const data=await r.json();if(!r.ok)throw new Error(data.error||'Captains failed');state.captains=data;draw();}catch(error){console.warn('Cove captains unavailable',error);state.captains=[];draw();}}
    async function loadMediaForBoat(boat){try{const r=await fetch(`${COVE_API}/api/v1/media?entityType=boat&entityId=${encodeURIComponent(boat.id)}`,{cache:'no-store'});const data=await r.json();if(!r.ok)throw new Error(data.error||'Media failed');state.media=normalizeMedia(data);state.activePhoto=Math.max(0,photos().findIndex(m=>m.isCover));draw();}catch(error){console.warn('Cove media unavailable',error);state.media=[];draw();}}
    async function loadFromApi(){const r=await fetch(`${COVE_API}/api/v1/boats`,{cache:'no-store'});const data=await r.json();if(!r.ok)throw new Error(data.error||'API failed');const boat=data.find(item=>item.slug===requested||item.id===requested)||data[0];if(!boat)throw new Error('No boat records found');render(boat);await Promise.all([loadMediaForBoat(boat),loadCaptainsForBoat(boat)]);}
    async function loadFallback(){const r=await fetch('data/boats.json',{cache:'no-store'});const data=await r.json();const boat=data.find(item=>item.slug===requested||item.id===requested)||data[0];render(boat);}
    loadFromApi().catch(error=>{console.warn('Cove API unavailable, using JSON fallback',error);loadFallback().catch(()=>{document.getElementById('app').innerHTML='<div class="loading">Boat details could not be loaded.</div>';});});
  </script>
</body>
</html>
