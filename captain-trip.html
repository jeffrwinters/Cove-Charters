<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove Charters | Captain Trip</title>
  <meta name="description" content="Captain trip details and availability for an assigned Cove Charters booking." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#071923;--water:#0f6f8f;--sand:#f2dfbd;--ink:#10212b;--muted:#667987;--bg:#f8f3e9;--line:#dbe7eb;--good:#1f8a5b;--bad:#a43c3c;--shadow:0 22px 60px rgba(7,25,35,.14)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg)}button,input,textarea{font:inherit}a{color:inherit}.wrap{width:min(960px,calc(100% - 32px));margin:auto;padding-bottom:40px}.nav{padding:22px 0}.brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase}.hero,.card{background:white;border:1px solid rgba(16,33,43,.08);border-radius:24px;box-shadow:var(--shadow);padding:24px}.hero{background:var(--navy);color:white}.hero h1{margin:8px 0 10px;font-size:clamp(34px,7vw,62px);line-height:.92;letter-spacing:-.06em}.hero p{color:rgba(255,255,255,.76);line-height:1.6}.kicker{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--sand)}.meta,.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.pill{padding:8px 10px;border-radius:999px;background:#eef6f8;color:#3f5965;font-size:12px;font-weight:900}.hero .pill{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.18)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.card{margin:18px 0}.card h2{margin:0 0 12px;font-size:26px;letter-spacing:-.04em}.detail{border-radius:16px;background:#f8fbfc;border:1px solid var(--line);padding:14px}.detail span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.detail strong{display:block;margin-top:5px;font-size:17px;line-height:1.3;overflow-wrap:anywhere}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border:0;border-radius:999px;background:var(--navy);color:white;font-weight:900;text-decoration:none;cursor:pointer}.btn.light{background:#eef6f8;color:var(--navy);border:1px solid #d8e4e8}.btn.danger{background:#fff2f2;color:var(--bad);border:1px solid #f2cece}.btn:disabled{opacity:.55;cursor:not-allowed}.note{white-space:pre-wrap;line-height:1.55;color:#304854}.status{font-weight:900;color:var(--muted)}.status.good{color:var(--good)}.status.bad{color:var(--bad)}.form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-items:end}.form label{display:grid;gap:7px;color:#425967;font-weight:800;font-size:13px}.form input,.form textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;color:var(--ink)}.form .wide{grid-column:span 2}.calendar-head{display:flex;justify-content:space-between;gap:12px;align-items:center}.calendar-title{font-size:22px;font-weight:900;letter-spacing:-.035em}.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-top:12px}.calendar-day-name,.calendar-day{min-width:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.calendar-day-name:nth-child(7n),.calendar-day:nth-child(7n){border-right:0}.calendar-day-name{background:#f8fbfc;padding:10px;font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase}.calendar-day{min-height:118px;padding:10px;background:white}.calendar-day.out{background:#f8fbfc;color:#a8b6bd}.calendar-date{font-weight:900;font-size:13px}.calendar-event{width:100%;margin-top:7px;border:1px solid #cfe2e8;background:#edf6f8;color:var(--ink);border-radius:10px;padding:7px;text-align:left;font-size:12px;font-weight:800;line-height:1.25}.calendar-event.bad{border-color:#f2cece;background:#fff2f2}.calendar-event.good{border-color:#c9ead8;background:#e9f7f0}.calendar-event span{display:block;color:var(--muted);font-size:11px;font-weight:700;margin-top:3px}.availability-list{display:grid;gap:10px;margin-top:14px}.availability-row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;background:#fbfdfd;padding:12px}.availability-row strong,.availability-row span{display:block}.availability-row span{color:var(--muted);font-size:13px;margin-top:4px}@media(max-width:680px){.wrap{width:min(100% - 24px,960px)}.hero,.card{border-radius:20px;padding:20px}.grid,.form{grid-template-columns:1fr}.form .wide{grid-column:auto}.actions .btn,.form .btn{width:100%}.calendar-head{display:grid}.calendar-grid{grid-template-columns:1fr;border:0;gap:10px}.calendar-day-name{display:none}.calendar-day{border:1px solid var(--line);border-radius:16px;min-height:0}.calendar-day.out{display:none}.availability-row{display:grid}}@media print{body{background:white}.wrap{width:100%;padding:0}.hero,.card{box-shadow:none;break-inside:avoid}.hero{background:white;color:var(--ink)}.hero p{color:var(--muted)}.kicker{color:var(--water)}.btn{border:1px solid var(--line);background:white;color:var(--ink)}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav"><div class="brand">Cove Charters</div></nav>
    <section class="hero"><div class="kicker">Captain Trip</div><h1 id="title">Assigned charter.</h1><p id="intro">Loading trip details...</p><div class="meta" id="meta"></div></section>
    <main id="app"><section class="card"><p class="status">Loading...</p></section></main>
  </div>
  <script>
    const COVE_API='https://cove-api.jeff-r-winters.workers.dev';
    const token=new URLSearchParams(location.search).get('token')||'';
    const state={trip:null,documents:[],availability:[],trips:[],month:new Date(new Date().getFullYear(),new Date().getMonth(),1)};
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const dateKey=date=>[date.getFullYear(),String(date.getMonth()+1).padStart(2,'0'),String(date.getDate()).padStart(2,'0')].join('-');
    const monthRange=()=>{const start=new Date(state.month.getFullYear(),state.month.getMonth(),1);start.setDate(start.getDate()-start.getDay());const end=new Date(start);end.setDate(start.getDate()+41);return {from:dateKey(start),to:dateKey(end)};};
    function detail(label,value){return `<div class="detail"><span>${esc(label)}</span><strong>${esc(value||'Not provided')}</strong></div>`;}
    function shell(){const b=state.trip||{};const docs=state.documents||[];app.innerHTML=`<section class="card"><h2>Trip details</h2><div class="grid">${detail('Boat',b.boatName||b.boatId)}${detail('Date',b.charterDate)}${detail('Start time',b.startTime)}${detail('Duration',b.durationHours?`${b.durationHours} hours`:'')}${detail('Booking status',b.status)}${detail('Agreement',b.agreementStatus)}</div></section><section class="card"><h2>Customer</h2><div class="grid">${detail('Name',b.customerName)}${detail('Phone',b.customerPhone)}${detail('Email',b.customerEmail)}</div><div class="actions">${b.customerPhone?`<a class="btn" href="tel:${esc(b.customerPhone)}">Call Customer</a>`:''}${b.customerEmail?`<a class="btn light" href="mailto:${esc(b.customerEmail)}">Email Customer</a>`:''}</div></section><section class="card"><h2>Availability</h2><div class="calendar-head"><div><div class="calendar-title" id="calendarTitle">Calendar</div><p class="status" id="availabilityStatus">Loading availability...</p></div><div class="actions"><button class="btn light" type="button" id="prevMonth">Previous</button><button class="btn light" type="button" id="todayMonth">Today</button><button class="btn light" type="button" id="nextMonth">Next</button></div></div><div class="calendar-grid" id="captainCalendar"></div><form class="form" id="availabilityForm"><label>Start date<input id="availabilityStartDate" type="date" required></label><label>Start time<input id="availabilityStartTime" type="time" step="1800" required></label><label>End date<input id="availabilityEndDate" type="date" required></label><label>End time<input id="availabilityEndTime" type="time" step="1800" required></label><label class="wide">Notes<input id="availabilityNotes" placeholder="Unavailable, personal hold, travel, etc."></label><button class="btn" type="submit">Add Unavailable Time</button></form><div class="availability-list" id="availabilityList"></div></section><section class="card"><h2>Notes</h2><p class="note">${esc(b.customerNotes||'No customer notes provided.')}</p>${b.officeNotes?`<p class="note">${esc(b.officeNotes)}</p>`:''}</section><section class="card"><h2>Documents</h2>${docs.length?`<div class="actions">${docs.map(doc=>`<a class="btn light" href="${esc(doc.url)}" target="_blank" rel="noopener">${esc(doc.title||'Open document')}</a>`).join('')}</div>`:'<p class="status">No signed/supporting documents are attached yet.</p>'}</section>`;bindAvailabilityUi();renderAvailability();}
    function renderTrip(data){state.trip=data.booking||{};state.documents=data.documents||[];const b=state.trip;title.textContent=b.boatName||'Assigned charter';intro.textContent=`${b.charterDate||'Date TBD'} at ${b.startTime||'time TBD'} with ${b.customerName||'the customer'}.`;meta.innerHTML=[b.status,b.agreementStatus,b.durationHours?`${b.durationHours} hours`:null,b.captainName].filter(Boolean).map(x=>`<span class="pill">${esc(x)}</span>`).join('');shell();}
    function bindAvailabilityUi(){prevMonth.onclick=()=>{state.month=new Date(state.month.getFullYear(),state.month.getMonth()-1,1);loadAvailability();};nextMonth.onclick=()=>{state.month=new Date(state.month.getFullYear(),state.month.getMonth()+1,1);loadAvailability();};todayMonth.onclick=()=>{const now=new Date();state.month=new Date(now.getFullYear(),now.getMonth(),1);loadAvailability();};availabilityForm.onsubmit=e=>{e.preventDefault();addAvailability().catch(error=>availabilityStatus.textContent=error.message);};}
    function renderAvailability(){if(!captainCalendar)return;calendarTitle.textContent=state.month.toLocaleDateString([], {month:'long',year:'numeric'});availabilityStatus.textContent=`${state.availability.length} unavailable block(s), ${state.trips.length} assigned trip(s).`;const byDate={};state.trips.forEach(t=>{if(t.charterDate)(byDate[t.charterDate] ||= []).push({kind:'trip',item:t});});state.availability.forEach(a=>{const first=a.startAt.slice(0,10);(byDate[first] ||= []).push({kind:'availability',item:a});});const start=new Date(state.month.getFullYear(),state.month.getMonth(),1);start.setDate(start.getDate()-start.getDay());const end=new Date(start);end.setDate(start.getDate()+41);let html=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="calendar-day-name">${d}</div>`).join('');for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const key=dateKey(d);const events=byDate[key]||[];html+=`<div class="calendar-day ${d.getMonth()===state.month.getMonth()?'':'out'}"><div class="calendar-date">${d.getDate()}</div>${events.map(e=>e.kind==='trip'?`<div class="calendar-event good">${esc(e.item.startTime||'Time TBD')} ${esc(e.item.boatName||'Boat')}<span>${esc(e.item.customerName||'Guest')} | ${esc(e.item.durationHours||'')} hours</span></div>`:`<div class="calendar-event bad">Unavailable<span>${esc(e.item.startAt.slice(11,16))}-${esc(e.item.endAt.slice(11,16))} ${esc(e.item.notes||'')}</span></div>`).join('')}</div>`;}captainCalendar.innerHTML=html;availabilityList.innerHTML=state.availability.length?state.availability.map(a=>`<div class="availability-row"><div><strong>${esc(a.startAt.replace('T',' '))} to ${esc(a.endAt.replace('T',' '))}</strong><span>${esc(a.notes||a.status||'Unavailable')}</span></div><button class="btn danger" type="button" data-delete-availability="${esc(a.id)}">Delete</button></div>`).join(''):'<p class="status">No unavailable time is saved for this calendar window.</p>';availabilityList.querySelectorAll('[data-delete-availability]').forEach(btn=>btn.onclick=()=>deleteAvailability(btn.dataset.deleteAvailability));}
    function snapHalfHour(input){if(!input?.value)return;const [h,m]=input.value.split(':').map(Number);let total=Math.round((h*60+m)/30)*30;if(total>=1440)total=1410;input.value=`${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;}
    async function loadAvailability(){const range=monthRange();availabilityStatus.textContent='Loading availability...';const r=await fetch(`${COVE_API}/api/v1/captain-trips/${encodeURIComponent(token)}/availability?from=${range.from}&to=${range.to}`,{cache:'no-store'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not load availability.');state.availability=d.availability||[];state.trips=d.trips||[];renderAvailability();}
    async function addAvailability(){[availabilityStartTime,availabilityEndTime].forEach(snapHalfHour);const startAt=`${availabilityStartDate.value}T${availabilityStartTime.value}`;const endAt=`${availabilityEndDate.value||availabilityStartDate.value}T${availabilityEndTime.value}`;if(!availabilityStartDate.value||!availabilityStartTime.value||!availabilityEndTime.value)throw new Error('Choose a start and end time.');if(endAt<=startAt)throw new Error('End must be after start.');availabilityStatus.textContent='Saving unavailable time...';const r=await fetch(`${COVE_API}/api/v1/captain-trips/${encodeURIComponent(token)}/availability`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({startAt,endAt,notes:availabilityNotes.value})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not save availability.');availabilityNotes.value='';availabilityEndDate.value=availabilityStartDate.value;availabilityStatus.textContent='Unavailable time saved.';await loadAvailability();}
    async function deleteAvailability(id){if(!confirm('Delete this unavailable time?'))return;availabilityStatus.textContent='Deleting unavailable time...';const r=await fetch(`${COVE_API}/api/v1/captain-trips/${encodeURIComponent(token)}/availability/${encodeURIComponent(id)}`,{method:'DELETE'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not delete availability.');await loadAvailability();}
    async function load(){try{if(!token)throw new Error('Missing captain trip token.');const r=await fetch(`${COVE_API}/api/v1/captain-trips/${encodeURIComponent(token)}`,{cache:'no-store'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not load captain trip.');renderTrip(d);await loadAvailability();}catch(error){app.innerHTML=`<section class="card"><p class="status bad">${esc(error.message)}</p></section>`;}}
    load();
  </script>
</body>
</html>
