<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove Charters | Document Signing</title>
  <meta name="description" content="Complete Cove Charters required charter documents." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#071923;--water:#0f6f8f;--sand:#f2dfbd;--ink:#10212b;--muted:#667987;--bg:#f8f3e9;--line:#dbe7eb;--good:#1f8a5b;--bad:#a43c3c;--shadow:0 22px 60px rgba(7,25,35,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg)}button,input{font:inherit}.wrap{width:min(920px,calc(100% - 32px));margin:auto}.nav{padding:22px 0}.brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase}.hero{background:var(--navy);color:white;border-radius:28px;padding:28px;box-shadow:var(--shadow)}.hero h1{margin:8px 0 10px;font-size:clamp(34px,7vw,64px);line-height:.92;letter-spacing:-.06em}.hero p{color:rgba(255,255,255,.76);line-height:1.6}.kicker{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--sand)}.card{margin:18px 0;background:white;border:1px solid rgba(16,33,43,.08);border-radius:24px;box-shadow:var(--shadow);padding:22px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.pill{padding:8px 10px;border-radius:999px;background:#eef6f8;color:#3f5965;font-size:12px;font-weight:900}.details{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;background:#f8fbfc;border:1px solid var(--line);box-shadow:none}.detail{border-radius:16px;background:white;border:1px solid rgba(16,33,43,.07);padding:14px}.detail span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.detail strong{display:block;margin-top:4px;font-size:16px}.locked{margin:12px 0 0;color:var(--muted);font-weight:800;line-height:1.5}.steps{display:flex;gap:8px;overflow:auto;margin:18px 0}.step{min-width:42px;height:42px;border-radius:999px;border:1px solid var(--line);background:white;font-weight:900}.step.active{background:var(--navy);color:white}.doc h2,.signature h2{margin:0 0 10px;font-size:28px;letter-spacing:-.04em}.doc p,.signature p{line-height:1.6;color:var(--muted)}.legal{white-space:pre-wrap;background:#f8fbfc;border:1px solid var(--line);border-radius:18px;padding:16px;line-height:1.6;color:#304854}.accept,.final-details{display:grid;gap:10px;margin-top:18px}.accept label{display:flex;gap:10px;align-items:flex-start;font-weight:800}.final-details{grid-template-columns:1fr 1.6fr}.final-details label,.signature label{display:grid;gap:7px;color:#425967;font-weight:800;font-size:13px}.accept input[type="text"],.signature input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{min-height:44px;padding:0 18px;border:0;border-radius:999px;background:var(--navy);color:white;font-weight:900;cursor:pointer}.btn.light{background:#eef6f8;color:var(--navy)}.btn.sand{background:var(--sand);color:var(--navy)}.btn:disabled{opacity:.55;cursor:not-allowed}.status{font-weight:800;color:var(--muted)}.status.good{color:var(--good)}.status.bad{color:var(--bad)}.hidden{display:none}@media(max-width:640px){.hero,.card{border-radius:20px;padding:20px}.details,.final-details{grid-template-columns:1fr}.actions .btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav"><div class="brand">Cove Charters</div></nav>
    <section class="hero"><div class="kicker">Required Documents</div><h1>Complete your charter packet.</h1><p id="intro">Loading your document packet...</p><div class="meta" id="bookingMeta"></div></section>
    <main id="app"><section class="card">Loading...</section></main>
  </div>
  <script>
    const COVE_API='https://cove-api.jeff-r-winters.workers.dev';
    const token=new URLSearchParams(location.search).get('token')||'';
    const state={booking:null,sections:[],active:0,accepted:{},defaultInitials:''};
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function meta(){bookingMeta.innerHTML=[state.booking?.boatName,state.booking?.charterDate,state.booking?.startTime,state.booking?.captainName].filter(Boolean).map(x=>`<span class="pill">${esc(x)}</span>`).join('');intro.textContent=`Hi ${state.booking?.customerName||'there'}, review the confirmed charter details and sign the required documents below.`;}
    function charterDetailsMarkup(){const rows=[['Boat',state.booking?.boatName||state.booking?.boatId||'Confirmed boat'],['Captain',state.booking?.captainName||'Confirmed captain'],['Date',state.booking?.charterDate||'Confirmed date'],['Start time',state.booking?.startTime||'Confirmed start time'],['Duration',state.booking?.durationHours?`${state.booking.durationHours} hours`:'Confirmed duration'],['Customer',state.booking?.customerName||'Confirmed customer']];return `<section class="card details">${rows.map(([label,value])=>`<div class="detail"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join('')}<p class="locked">These details are locked for this signing packet. Contact Cove Charters if something needs to change.</p></section>`;}
    function render(){if(!token){app.innerHTML='<section class="card"><p class="status bad">Missing signing token.</p></section>';return;}const s=state.sections[state.active];if(!s){app.innerHTML='<section class="card"><p class="status">No document sections available.</p></section>';return;}const accepted=state.accepted[s.id]||{};const initialsValue=accepted.initials||state.defaultInitials||'';app.innerHTML=`${charterDetailsMarkup()}<div class="steps">${state.sections.map((section,i)=>`<button class="step ${i===state.active?'active':''}" type="button" data-step="${i}">${i+1}</button>`).join('')}</div><section class="card doc"><div class="kicker" style="color:var(--water)">Step ${state.active+1} of ${state.sections.length}</div><h2>${esc(s.title)}</h2><p>${esc(s.summary)}</p><div class="legal">${esc(s.body)}</div><div class="accept"><label><input id="acceptCheck" type="checkbox" ${accepted.accepted?'checked':''}> I have read and agree to this section.</label><label>Initials<input id="initials" type="text" value="${esc(initialsValue)}" maxlength="8" placeholder="JW" autocomplete="off"></label></div><div class="actions"><button class="btn light" id="prev" type="button" ${state.active===0?'disabled':''}>Previous</button><button class="btn" id="next" type="button">${state.active===state.sections.length-1?'Review and Sign':'Next'}</button></div><p class="status" id="sectionStatus"></p></section>${state.active===state.sections.length-1?signatureMarkup():''}`;document.querySelectorAll('[data-step]').forEach(btn=>btn.onclick=()=>{if(Number(btn.dataset.step)!==state.active&&!saveActive())return;state.active=Number(btn.dataset.step);render();});prev.onclick=()=>{if(!saveActive())return;state.active=Math.max(0,state.active-1);render();};next.onclick=()=>{if(!saveActive())return;if(state.active<state.sections.length-1){state.active++;render();}else document.getElementById('signatureName')?.focus();};initials.oninput=()=>{sectionStatus.textContent='';state.defaultInitials=initials.value.trim();};acceptCheck.onchange=()=>{sectionStatus.textContent='';};const form=document.getElementById('signatureForm');if(form)form.onsubmit=submitSignature;}
    function signatureMarkup(){return `<section class="card signature"><h2>Final trip details</h2><p>Confirm the total guest count and preferred pickup location. The boat, captain, date, and time are locked for this packet.</p><form id="signatureForm"><div class="final-details"><label>Total guest count<input id="guestCount" type="number" min="1" step="1" required inputmode="numeric" placeholder="8"></label><label>Preferred pickup location<input id="pickupLocation" required autocomplete="off" placeholder="Marina, dock, or pickup point"></label></div><h2 style="margin-top:22px">Sign document packet</h2><p>Typing your full legal name below records your electronic signature for the packet above.</p><label>Full legal name<input id="signatureName" required autocomplete="name"></label><label>Email<input id="signatureEmail" type="email" value="${esc(state.booking?.email||'')}" autocomplete="email"></label><div class="actions"><button class="btn sand" type="submit">Submit Signature</button></div><p class="status" id="submitStatus"></p></form></section>`}
    function saveActive(){const s=state.sections[state.active];const checked=document.getElementById('acceptCheck')?.checked;const initials=document.getElementById('initials')?.value.trim();if(!checked||!initials){sectionStatus.textContent='Check the acceptance box and enter initials before continuing.';sectionStatus.className='status bad';return false;}state.defaultInitials=initials;state.accepted[s.id]={id:s.id,title:s.title,accepted:true,initials};return true;}
    async function submitSignature(event){event.preventDefault();if(!state.sections.every(section=>state.accepted[section.id]?.accepted)){submitStatus.textContent='All sections must be accepted before signing.';submitStatus.className='status bad';return;}const guestTotal=Number(guestCount.value||0);const pickup=pickupLocation.value.trim();if(!guestTotal||guestTotal<1){submitStatus.textContent='Enter the total guest count before submitting.';submitStatus.className='status bad';return;}if(!pickup){submitStatus.textContent='Enter the preferred pickup location before submitting.';submitStatus.className='status bad';return;}submitStatus.textContent='Submitting signature...';submitStatus.className='status';const payload={signerName:signatureName.value.trim(),signerEmail:signatureEmail.value.trim(),signatureText:signatureName.value.trim(),userAgent:navigator.userAgent,accepted:state.sections.map(section=>state.accepted[section.id]),finalDetails:{guestCount:guestTotal,pickupLocation:pickup}};try{const r=await fetch(`${COVE_API}/api/v1/signing/${encodeURIComponent(token)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not submit signature');app.innerHTML='<section class="card"><h2>Documents signed</h2><p class="status good">Thank you. Cove has received your signed documents. Your captain will reach out to coordinate any remaining details. Enjoy your trip!</p></section>';}catch(error){submitStatus.textContent=error.message;submitStatus.className='status bad';}}
    async function load(){try{const r=await fetch(`${COVE_API}/api/v1/signing/${encodeURIComponent(token)}`,{cache:'no-store'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Could not load signing packet');state.booking=d.booking;state.sections=d.sections||[];meta();if(d.completed){app.innerHTML='<section class="card"><h2>Already signed</h2><p class="status good">This document packet has already been completed.</p></section>';return;}render();}catch(error){app.innerHTML=`<section class="card"><p class="status bad">${esc(error.message)}</p></section>`;}}
    load();
  </script>
</body>
</html>
